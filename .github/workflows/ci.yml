name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  semgrep-rules:
    name: Semgrep rule tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Semgrep
        run: pip install semgrep
      - name: Validate & test rules (pass/fail fixtures)
        run: semgrep --test --config plugins/debug-hunter/rules/semgrep plugins/debug-hunter/rules/semgrep

  benchmark:
    name: Benchmark scorer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate case & findings JSON
        run: |
          for f in benchmark/cases/*.json benchmark/samples/*.json benchmark/schema/*.json; do
            python3 -m json.tool "$f" > /dev/null
          done
      - name: Run benchmark scorer (report-only, sample findings)
        run: |
          python3 benchmark/score.py \
            --findings benchmark/samples/baseline-findings.sample.json \
            --out benchmark/metrics.json
      - name: Upload metrics
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-metrics
          path: benchmark/metrics.json

  mutation-harness:
    name: Mutation harness (kill-check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Generate mutants & assert all pass 3-gate (compile + clean-oracle + mutant-oracle)
        run: |
          python3 benchmark/mutation/generate.py | tee /tmp/mut.log
          grep -q "valid_mutant_rate = 100%" /tmp/mut.log || { echo "✗ 有 operator 未通過三段 gate（等價/無效/洩漏 mutant）"; exit 1; }
      - name: Leak-check generated mutants (no answer-revealing tokens)
        run: |
          if grep -rEi "vuln|fixed|safevault|PAT-|SEC-|FIN-|INV-|idor|toctou|residue|exploit|//|main\(" benchmark/mutation/mutants/; then
            echo "✗ mutant 洩漏提示字串"; exit 1
          fi
          echo "✓ 零洩漏"

  e2e-demo:
    name: End-to-end demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Compile & run closed-loop demos
        run: |
          cd plugins/debug-hunter/examples/vulnerable-settlement
          javac IdorDemo.java && java IdorDemo
          javac PaymentCallbackDemo.java && java PaymentCallbackDemo
          javac OracleManipulationDemo.java && java OracleManipulationDemo
          javac DoubleSpendDemo.java && java DoubleSpendDemo
          javac MassAssignmentDemo.java && java MassAssignmentDemo
          javac ReplayDemo.java && java ReplayDemo
          javac SchedulerRaceDemo.java && java SchedulerRaceDemo
          javac TradingWindowRaceDemo.java && java TradingWindowRaceDemo
          javac LockTtlDemo.java && java LockTtlDemo
          javac FloatMoneyDemo.java && java FloatMoneyDemo
          javac BigDecimalEqualsDemo.java && java BigDecimalEqualsDemo
          javac DivideRoundingDemo.java && java DivideRoundingDemo
          javac AssetScaleDemo.java && java AssetScaleDemo
          javac AllocationResidueDemo.java && java AllocationResidueDemo
          javac TimestampUnitDemo.java && java TimestampUnitDemo
          javac LongOverflowDemo.java && java LongOverflowDemo
          javac SettlementGuardDemo.java && java SettlementGuardDemo
          javac AmountTamperDemo.java && java AmountTamperDemo
          javac MakerCheckerDemo.java && java MakerCheckerDemo
          javac AuditTrailDemo.java && java AuditTrailDemo
          javac VelocityDemo.java && java VelocityDemo
          javac PromoAbuseDemo.java && java PromoAbuseDemo
          javac IdempotencyKeyDemo.java && java IdempotencyKeyDemo
